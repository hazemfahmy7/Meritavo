document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

mily: 'Public Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"408a80bb-1f5b-407b-a88f-47b668e76077\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Public Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"1a51e98f-80a1-4d77-8c26-3badfc697551\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Public Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"d53372b0-1a23-4163-b983-b2fd6bf80032\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Public Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"408a80bb-1f5b-407b-a88f-47b668e76077\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Public Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"1a51e98f-80a1-4d77-8c26-3badfc697551\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Public Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"d53372b0-1a23-4163-b983-b2fd6bf80032\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box}\n  html{scroll-behavior:smooth}\n  body{margin:0;background:#F7F4EC;font-family:'Public Sans',system-ui,sans-serif;color:#25271F;-webkit-font-smoothing:antialiased}\n  ::selection{background:#B07A4B;color:#F7F4EC}\n  a{color:inherit}\n  .wm{font-family:Georgia,'Times New Roman',serif;font-weight:700;letter-spacing:-.01em}\n  .eyebrow{font:600 12px/1 'Public Sans',sans-serif;letter-spacing:.2em;text-transform:uppercase;color:#B07A4B}\n  .lp{line-height:1.62}\n  .btn{cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;transition:transform .12s ease, background .15s ease, opacity .15s ease}\n  .btn:hover{transform:translateY(-1px)}\n  .navlink{text-decoration:none;font-size:14px;font-weight:500;color:rgba(247,244,236,.78);transition:color .15s ease}\n  .navlink:hover{color:#F7F4EC}\n  .wrap{max-width:1120px;margin:0 auto;padding:0 32px}\n  input.wl::placeholder{color:rgba(247,244,236,.45)}\n  .row{display:flex;flex-wrap:wrap}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div>\n  <!-- ===== MASTHEAD ===== -->\n  <header style=\"background:#1F3D2F;border-bottom:3px solid #B07A4B;position:sticky;top:0;z-index:50\">\n    <div class=\"wrap\" style=\"display:flex;align-items:center;justify-content:space-between;padding-top:18px;padding-bottom:18px\">\n      <div style=\"display:flex;align-items:baseline;gap:14px\">\n        <span class=\"wm\" style=\"font-size:25px;color:#F7F4EC\">Meritavo<\u002Fspan>\n        <span class=\"eyebrow\" style=\"color:rgba(247,244,236,.5);font-size:11px\">Grant Operations<\u002Fspan>\n      <\u002Fdiv>\n      <nav class=\"row\" style=\"align-items:center;gap:30px\">\n        <a class=\"navlink\" href=\"#how\">How it works<\u002Fa>\n        <a class=\"navlink\" href=\"#features\">Features<\u002Fa>\n        <a class=\"navlink\" href=\"#pricing\">Pricing<\u002Fa>\n        <a class=\"btn\" href=\"#waitlist\" style=\"font-size:14px;font-weight:600;color:#1F3D2F;background:#F7F4EC;padding:10px 18px;border-radius:7px\">Join waitlist<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== HERO ===== -->\n  <section style=\"background:#F7F4EC;padding:84px 0 72px\">\n    <div class=\"wrap row\" style=\"gap:56px;align-items:center\">\n      <div style=\"flex:1;min-width:330px\">\n        <div class=\"eyebrow\" style=\"margin-bottom:20px\">Post‑award grant management<\u002Fdiv>\n        <h1 class=\"wm\" style=\"margin:0 0 22px;font-size:54px;line-height:1.08;color:#1F3D2F;text-wrap:balance\">Every deadline, report, and closeout—handled.<\u002Fh1>\n        <p class=\"lp\" style=\"margin:0 0 32px;font-size:18px;color:#494d40;max-width:480px\">From the moment an award letter lands to the day the grant is archived, Meritavo runs the operational busywork—so your team can focus on the work the funding paid for.<\u002Fp>\n        <div class=\"row\" style=\"gap:14px;align-items:center\">\n          <a class=\"btn\" href=\"#waitlist\" style=\"font-size:15px;font-weight:600;color:#F7F4EC;background:#1F3D2F;padding:15px 26px;border-radius:8px\">Join the waitlist<\u002Fa>\n          <a class=\"btn\" href=\"#how\" style=\"font-size:15px;font-weight:600;color:#1F3D2F;padding:15px 10px\">See how it works →<\u002Fa>\n        <\u002Fdiv>\n        <div class=\"row\" style=\"gap:22px;margin-top:34px;align-items:center\">\n          <span style=\"font-size:12.5px;color:#8a8d7e\">Built for foundation‑funded nonprofits<\u002Fspan>\n          <span style=\"width:4px;height:4px;border-radius:50%;background:#cdc6b4\"><\u002Fspan>\n          <span style=\"font-size:12.5px;color:#8a8d7e\">$0 setup · cancel anytime<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- product mockup -->\n      <div style=\"flex:1;min-width:380px\">\n        <div style=\"background:#fff;border:1px solid rgba(31,61,47,.13);border-radius:14px;overflow:hidden;box-shadow:0 30px 60px -28px rgba(31,61,47,.5)\">\n          <div style=\"background:#1F3D2F;padding:14px 18px;display:flex;align-items:center;gap:9px\">\n            <span style=\"width:9px;height:9px;border-radius:50%;background:#B07A4B\"><\u002Fspan>\n            <span class=\"wm\" style=\"font-size:15px;color:#F7F4EC\">Meritavo<\u002Fspan>\n            <span style=\"font-size:12px;color:rgba(247,244,236,.5);margin-left:4px\">Upcoming deadlines<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:8px 6px 12px\">\n            <div class=\"row\" style=\"align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid rgba(31,61,47,.08)\">\n              <div><div style=\"font-size:15px;font-weight:600;color:#25271F\">The Cedar Brook Fund<\u002Fdiv><div style=\"font-size:12.5px;color:#8a8d7e;margin-top:2px\">Final report<\u002Fdiv><\u002Fdiv>\n              <span style=\"font-size:11.5px;font-weight:700;color:#fff;background:#8F2A20;padding:5px 11px;border-radius:20px\">Due in 1 day<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"row\" style=\"align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid rgba(31,61,47,.08)\">\n              <div><div style=\"font-size:15px;font-weight:600;color:#25271F\">Hartwell Foundation<\u002Fdiv><div style=\"font-size:12.5px;color:#8a8d7e;margin-top:2px\">Interim progress report<\u002Fdiv><\u002Fdiv>\n              <span style=\"font-size:11.5px;font-weight:700;color:#fff;background:#B23B2E;padding:5px 11px;border-radius:20px\">Due in 7 days<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"row\" style=\"align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid rgba(31,61,47,.08)\">\n              <div><div style=\"font-size:15px;font-weight:600;color:#25271F\">Riverside Initiative<\u002Fdiv><div style=\"font-size:12.5px;color:#8a8d7e;margin-top:2px\">Closeout checklist opens<\u002Fdiv><\u002Fdiv>\n              <span style=\"font-size:11.5px;font-weight:700;color:#fff;background:#B07A4B;padding:5px 11px;border-radius:20px\">In 14 days<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"row\" style=\"align-items:center;justify-content:space-between;padding:15px 16px\">\n              <div><div style=\"font-size:15px;font-weight:600;color:#25271F\">Mobile Dental Care<\u002Fdiv><div style=\"font-size:12.5px;color:#8a8d7e;margin-top:2px\">Milestone check‑in<\u002Fdiv><\u002Fdiv>\n              <span style=\"font-size:11.5px;font-weight:700;color:#fff;background:#2F7D54;padding:5px 11px;border-radius:20px\">On track<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== HOW IT WORKS ===== -->\n  <section id=\"how\" style=\"background:#F1ECDF;padding:78px 0;border-top:1px solid rgba(31,61,47,.09)\">\n    <div class=\"wrap\">\n      <div style=\"text-align:center;margin-bottom:50px\">\n        <div class=\"eyebrow\" style=\"margin-bottom:14px\">How it works<\u002Fdiv>\n        <h2 class=\"wm\" style=\"margin:0;font-size:38px;color:#1F3D2F;text-wrap:balance\">The post‑award loop, on autopilot<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"row\" style=\"gap:26px\">\n        <div style=\"flex:1;min-width:220px\">\n          <div class=\"wm\" style=\"font-size:22px;color:#B07A4B;margin-bottom:12px\">01<\u002Fdiv>\n          <div style=\"font-size:17px;font-weight:600;color:#1F3D2F;margin-bottom:8px\">Upload the award letter<\u002Fdiv>\n          <div class=\"lp\" style=\"font-size:14.5px;color:#6a6d60\">Meritavo reads it and extracts the funder, amount, period, and reporting schedule—no manual data entry.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:220px\">\n          <div class=\"wm\" style=\"font-size:22px;color:#B07A4B;margin-bottom:12px\">02<\u002Fdiv>\n          <div style=\"font-size:17px;font-weight:600;color:#1F3D2F;margin-bottom:8px\">Deadlines schedule themselves<\u002Fdiv>\n          <div class=\"lp\" style=\"font-size:14.5px;color:#6a6d60\">Every reporting date and milestone becomes a tracked deadline, synced straight to your calendar.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:220px\">\n          <div class=\"wm\" style=\"font-size:22px;color:#B07A4B;margin-bottom:12px\">03<\u002Fdiv>\n          <div style=\"font-size:17px;font-weight:600;color:#1F3D2F;margin-bottom:8px\">Reminders that escalate<\u002Fdiv>\n          <div class=\"lp\" style=\"font-size:14.5px;color:#6a6d60\">Automatic reminders before every due date, escalating as it nears—plus an alert the moment a deadline goes overdue.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:220px\">\n          <div class=\"wm\" style=\"font-size:22px;color:#B07A4B;margin-bottom:12px\">04<\u002Fdiv>\n          <div style=\"font-size:17px;font-weight:600;color:#1F3D2F;margin-bottom:8px\">Guided closeout &amp; archive<\u002Fdiv>\n          <div class=\"lp\" style=\"font-size:14.5px;color:#6a6d60\">A funder‑shaped checklist opens as the grant ends; every document lands in a tidy archive.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FEATURES ===== -->\n  <section id=\"features\" style=\"background:#1F3D2F;padding:80px 0\">\n    <div class=\"wrap\">\n      <div style=\"margin-bottom:44px;max-width:560px\">\n        <div class=\"eyebrow\" style=\"margin-bottom:14px\">What you get<\u002Fdiv>\n        <h2 class=\"wm\" style=\"margin:0 0 14px;font-size:38px;color:#F7F4EC;text-wrap:balance\">Everything the funding agreement asks of you, tracked in one place.<\u002Fh2>\n        <p class=\"lp\" style=\"margin:0;font-size:16px;color:rgba(247,244,236,.65)\">Purpose‑built for the post‑award stage—not a bloated enterprise suite, and not another spreadsheet.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"row\" style=\"gap:18px\">\n        <div style=\"flex:1;min-width:240px;background:rgba(247,244,236,.05);border:1px solid rgba(247,244,236,.13);border-radius:12px;padding:24px\">\n          <div style=\"font-size:17px;font-weight:600;color:#F7F4EC;margin-bottom:8px\">Award intake &amp; extraction<\u002Fdiv>\n          <div class=\"lp\" style=\"font-size:14px;color:rgba(247,244,236,.6)\">Drop in the letter or agreement; get a structured grant record back in seconds.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:240px;background:rgba(247,244,236,.05);border:1px solid rgba(247,244,236,.13);border-radius:12px;padding:24px\">\n          <div style=\"font-size:17px;font-weight:600;color:#F7F4EC;margin-bottom:8px\">Deadline tracking &amp; calendar sync<\u002Fdiv>\n          <div class=\"lp\" style=\"font-size:14px;color:rgba(247,244,236,.6)\">One queue for every reporting date and milestone, mirrored to your calendar.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:240px;background:rgba(247,244,236,.05);border:1px solid rgba(247,244,236,.13);border-radius:12px;padding:24px\">\n          <div style=\"font-size:17px;font-weight:600;color:#F7F4EC;margin-bottom:8px\">Escalating reminders<\u002Fdiv>\n          <div class=\"lp\" style=\"font-size:14px;color:rgba(247,244,236,.6)\">Email nudges that ramp up as a date nears, so a deadline never sneaks past.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\" style=\"gap:18px;margin-top:18px\">\n        <div style=\"flex:1;min-width:240px;background:rgba(247,244,236,.05);border:1px solid rgba(247,244,236,.13);border-radius:12px;padding:24px\">\n          <div style=\"font-size:17px;font-weight:600;color:#F7F4EC;margin-bottom:8px\">Guided closeout<\u002Fdiv>\n          <div class=\"lp\" style=\"font-size:14px;color:rgba(247,244,236,.6)\">A funder‑shaped checklist—final report, impact data, stewardship, sign‑off.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:240px;background:rgba(176,122,75,.14);border:1px solid #B07A4B;border-radius:12px;padding:24px\">\n          <div class=\"row\" style=\"align-items:center;gap:8px;margin-bottom:8px\"><span style=\"font-size:17px;font-weight:600;color:#F7F4EC\">AI report drafting<\u002Fspan><span style=\"font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#B07A4B;border:1px solid #B07A4B;border-radius:5px;padding:2px 7px\">Growth<\u002Fspan><\u002Fdiv>\n          <div class=\"lp\" style=\"font-size:14px;color:rgba(247,244,236,.62)\">Turn your progress notes into a first‑draft funder report, ready to refine.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:240px;background:rgba(176,122,75,.14);border:1px solid #B07A4B;border-radius:12px;padding:24px\">\n          <div class=\"row\" style=\"align-items:center;gap:8px;margin-bottom:8px\"><span style=\"font-size:17px;font-weight:600;color:#F7F4EC\">Per‑grant documents<\u002Fspan><span style=\"font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#B07A4B;border:1px solid #B07A4B;border-radius:5px;padding:2px 7px\">Growth<\u002Fspan><\u002Fdiv>\n          <div class=\"lp\" style=\"font-size:14px;color:rgba(247,244,236,.62)\">A working folder per grant—letters, drafts, and reports filed automatically.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== PRICING ===== -->\n  <section id=\"pricing\" style=\"background:#F7F4EC;padding:82px 0\">\n    <div class=\"wrap\">\n      <div style=\"text-align:center;margin-bottom:48px\">\n        <div class=\"eyebrow\" style=\"margin-bottom:14px\">Pricing<\u002Fdiv>\n        <h2 class=\"wm\" style=\"margin:0 0 10px;font-size:38px;color:#1F3D2F\">Self‑serve. No setup fee.<\u002Fh2>\n        <p class=\"lp\" style=\"margin:0;font-size:16px;color:#8a8d7e\">Start free, upgrade when you're ready, cancel anytime.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"row\" style=\"gap:24px;justify-content:center;align-items:stretch\">\n        <div style=\"flex:1;min-width:300px;max-width:380px;border:1px solid rgba(31,61,47,.16);border-radius:14px;padding:32px;background:#fff;display:flex;flex-direction:column\">\n          <div class=\"wm\" style=\"font-size:24px;color:#1F3D2F;margin-bottom:6px\">Essentials<\u002Fdiv>\n          <div style=\"margin-bottom:18px\"><span style=\"font-size:25px;font-weight:700;color:#1F3D2F\">Pricing at launch<\u002Fspan><\u002Fdiv>\n          <div class=\"lp\" style=\"font-size:14px;color:#6a6d60;margin-bottom:22px\">The core post‑award loop—everything to keep grants on schedule.<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:11px;margin-bottom:28px\">\n            <div style=\"font-size:14px;color:#3a3d33\">✓&nbsp; Award intake &amp; extraction<\u002Fdiv>\n            <div style=\"font-size:14px;color:#3a3d33\">✓&nbsp; Deadline tracking &amp; calendar sync<\u002Fdiv>\n            <div style=\"font-size:14px;color:#3a3d33\">✓&nbsp; Escalating reminders<\u002Fdiv>\n            <div style=\"font-size:14px;color:#3a3d33\">✓&nbsp; Closeout checklist<\u002Fdiv>\n            <div style=\"font-size:14px;color:#3a3d33\">✓&nbsp; Report tracking<\u002Fdiv>\n          <\u002Fdiv>\n          <a class=\"btn\" href=\"#waitlist\" style=\"margin-top:auto;font-size:14px;font-weight:600;color:#1F3D2F;border:1.5px solid #1F3D2F;padding:13px;border-radius:8px\">Join the waitlist<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:300px;max-width:380px;border:1.5px solid #B07A4B;border-radius:14px;padding:32px;background:#fff;display:flex;flex-direction:column;position:relative;box-shadow:0 24px 48px -28px rgba(176,122,75,.7)\">\n          <span style=\"position:absolute;top:-12px;right:24px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:#B07A4B;padding:5px 12px;border-radius:20px\">Most popular<\u002Fspan>\n          <div class=\"wm\" style=\"font-size:24px;color:#1F3D2F;margin-bottom:6px\">Growth<\u002Fdiv>\n          <div style=\"margin-bottom:18px\"><span style=\"font-size:25px;font-weight:700;color:#1F3D2F\">Pricing at launch<\u002Fspan><\u002Fdiv>\n          <div class=\"lp\" style=\"font-size:14px;color:#6a6d60;margin-bottom:22px\">Everything in Essentials, plus the two biggest time‑savers.<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:11px;margin-bottom:28px\">\n            <div style=\"font-size:14px;color:#3a3d33;font-weight:600\">Everything in Essentials, plus:<\u002Fdiv>\n            <div style=\"font-size:14px;color:#3a3d33\">✓&nbsp; AI report drafting<\u002Fdiv>\n            <div style=\"font-size:14px;color:#3a3d33\">✓&nbsp; Per‑grant document management<\u002Fdiv>\n            <div style=\"font-size:14px;color:#3a3d33\">✓&nbsp; Priority email support<\u002Fdiv>\n          <\u002Fdiv>\n          <a class=\"btn\" href=\"#waitlist\" style=\"margin-top:auto;font-size:14px;font-weight:600;color:#F7F4EC;background:#1F3D2F;padding:13px;border-radius:8px\">Join the waitlist<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"lp\" style=\"text-align:center;margin:26px 0 0;font-size:13px;color:#8a8d7e\">Need hands‑on setup? An optional done‑for‑you onboarding add‑on is available—never required.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== WAITLIST ===== -->\n  <section id=\"waitlist\" style=\"background:#1F3D2F;border-top:3px solid #B07A4B;padding:78px 0\">\n    <div class=\"wrap\" style=\"max-width:680px;text-align:center\">\n      <div class=\"eyebrow\" style=\"margin-bottom:16px\">Early access<\u002Fdiv>\n      <h2 class=\"wm\" style=\"margin:0 0 16px;font-size:40px;color:#F7F4EC;text-wrap:balance\">Get on the waitlist<\u002Fh2>\n      <p class=\"lp\" style=\"margin:0 0 30px;font-size:17px;color:rgba(247,244,236,.7)\">We're onboarding a first group of foundation‑funded nonprofits now. Leave your email and we'll reach out as spots open.<\u002Fp>\n      <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n        <form onsubmit=\"{{ onJoin }}\" class=\"row\" style=\"display:flex;flex-direction:column;gap:10px;max-width:480px;margin:0 auto\">\n          <input class=\"wl\" name=\"name\" type=\"text\" placeholder=\"Your name (optional)\" style=\"width:100%;box-sizing:border-box;font-size:15px;font-family:'Public Sans',sans-serif;padding:14px 16px;border-radius:8px;border:1px solid rgba(247,244,236,.25);background:rgba(247,244,236,.07);color:#F7F4EC;outline:none\">\n          <input class=\"wl\" name=\"org\" type=\"text\" placeholder=\"Organization (optional)\" style=\"width:100%;box-sizing:border-box;font-size:15px;font-family:'Public Sans',sans-serif;padding:14px 16px;border-radius:8px;border:1px solid rgba(247,244,236,.25);background:rgba(247,244,236,.07);color:#F7F4EC;outline:none\">\n          <input class=\"wl\" name=\"email\" type=\"email\" required=\"\" placeholder=\"you@nonprofit.org\" style=\"width:100%;box-sizing:border-box;font-size:15px;font-family:'Public Sans',sans-serif;padding:14px 16px;border-radius:8px;border:1px solid rgba(247,244,236,.25);background:rgba(247,244,236,.07);color:#F7F4EC;outline:none\">\n          <button class=\"btn\" type=\"submit\" style=\"width:100%;font-size:15px;font-weight:600;color:#1F3D2F;background:#B07A4B;border:none;padding:14px 26px;border-radius:8px;cursor:pointer\">Join the waitlist<\u002Fbutton>\n        <\u002Fform>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-size:16px;color:#F7F4EC;background:rgba(176,122,75,.2);border:1px solid #B07A4B;border-radius:10px;padding:18px 22px;max-width:480px;margin:0 auto\">✓&nbsp; You're on the list. Thanks—watch your inbox for an invite.<\u002Fdiv>\n      <\u002Fsc-if>\n      <div class=\"row\" style=\"gap:10px;justify-content:center;margin-top:34px\">\n        <span style=\"font-size:11px;font-weight:600;letter-spacing:.05em;color:rgba(247,244,236,.55);border:1px solid rgba(247,244,236,.22);border-radius:6px;padding:7px 13px\">Encrypted in transit &amp; at rest<\u002Fspan>\n        <span style=\"font-size:11px;font-weight:600;letter-spacing:.05em;color:rgba(247,244,236,.55);border:1px solid rgba(247,244,236,.22);border-radius:6px;padding:7px 13px\">Stripe billing<\u002Fspan>\n        <span style=\"font-size:11px;font-weight:600;letter-spacing:.05em;color:rgba(247,244,236,.55);border:1px solid rgba(247,244,236,.22);border-radius:6px;padding:7px 13px\">Encrypted &amp; isolated<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FOOTER ===== -->\n  <footer style=\"background:#16302488;background:#142a1f;padding:34px 0\">\n    <div class=\"wrap row\" style=\"align-items:center;justify-content:space-between;gap:16px\">\n      <div style=\"display:flex;align-items:baseline;gap:12px\">\n        <span class=\"wm\" style=\"font-size:18px;color:rgba(247,244,236,.85)\">Meritavo<\u002Fspan>\n        <span style=\"font-size:12.5px;color:rgba(247,244,236,.4)\">meritavo.com<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-size:12.5px;color:rgba(247,244,236,.4)\">© 2026 Meritavo · Post‑award grant operations<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { joined: false };\n  renderVals() {\n    return {\n      submitted: this.state.joined,\n      notSubmitted: !this.state.joined,\n      onJoin: (e) => {\n        if (e && e.preventDefault) e.preventDefault();\n        const form = e.target;\n        const val = (n) => { const el = form.querySelector('input[name=\"' + n + '\"]'); return el ? el.value.trim() : ''; };\n        const email = val('email');\n        if (!email) return;\n        const btn = form.querySelector('button[type=\"submit\"]');\n        const label = btn ? btn.textContent : '';\n        if (btn) { btn.disabled = true; btn.textContent = 'Joining\\u2026'; }\n        fetch('https://hook.us2.make.com/fm4kol70475f619zdwzsoicvdsq54hew', {\n          method: 'POST',\n          body: new URLSearchParams({ name: val('name'), org: val('org'), email: email, source: 'meritavo.com', ts: new Date().toISOString() })\n        }).then((r) => {\n          if (!r.ok) throw new Error('HTTP ' + r.status);\n          this.setState({ joined: true });\n        }).catch(() => {\n          if (btn) { btn.disabled = false; btn.textContent = label; }\n          alert('Sorry \\u2014 something went wrong. Please try again.');\n        });\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
